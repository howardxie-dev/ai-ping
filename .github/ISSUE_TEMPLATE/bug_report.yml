name: Bug report
description: Report a bug in AI Ping
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AI Ping.

        Do not paste API keys, Authorization headers, private endpoint secrets, private base URLs, or sensitive customer data. Please sanitize commands, logs, JSON reports, and HTML reports before sharing.

        Useful report commands:

        ```bash
        aiping check ... --json > aiping-report.json
        aiping check ... --html aiping-report.html
        ```

  - type: input
    id: version
    attributes:
      label: AI Ping version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.x / v22.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS / Linux / Windows"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the command you ran. Remove API keys, Authorization headers, and private endpoint secrets.
      render: bash
    validations:
      required: true

  - type: input
    id: profile
    attributes:
      label: Profile
      placeholder: "openai-chat / openai-responses / ollama / gemini / anthropic"
    validations:
      required: true

  - type: input
    id: endpoint_type
    attributes:
      label: Base URL type
      description: Describe the endpoint type without exposing a private URL if it is sensitive.
      placeholder: "public provider / local mock / local Ollama / private gateway / self-hosted"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "gpt-5.1-mini / llama3.2 / gemini-2.5-flash / claude-sonnet-4-5"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: console_output
    attributes:
      label: Console output
      description: Paste relevant output with secrets removed.
      render: text

  - type: textarea
    id: json_report
    attributes:
      label: Sanitized JSON report
      description: Paste or attach output from `aiping check ... --json > aiping-report.json` after removing secrets and private details.
      render: json

  - type: textarea
    id: html_report
    attributes:
      label: Sanitized HTML report
      description: Attach or link a sanitized report from `aiping check ... --html aiping-report.html` if available. Do not paste secrets or private endpoint details.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that helps reproduce or understand the issue.
