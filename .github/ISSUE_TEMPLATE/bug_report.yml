name: Bug report
description: Report a bug in AI Ping
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AI Ping version
      placeholder: "0.2.5"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.x"
    validations:
      required: true

  - type: input
    id: package_manager
    attributes:
      label: pnpm/npm version
      placeholder: "pnpm 10.x / npm 11.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS / Linux / Windows"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
