name: Desktop Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach desktop preview artifacts to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  desktop-preview:
    name: Build ${{ matrix.name }} ${{ matrix.arch }} desktop preview
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            arch: universal
            artifact: macos-universal
            asset_prefix: AI-Ping-Desktop-Preview_1.4.0_macos-universal
            os: macos-15
            tauri_args: "--target universal-apple-darwin --bundles app,dmg"
            bundle_dir: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          - name: Windows
            arch: x64
            artifact: windows-x64
            asset_prefix: AI-Ping-Desktop-Preview_1.4.0_windows-x64
            os: windows-2025
            tauri_args: "--bundles nsis,msi"
            bundle_dir: apps/desktop/src-tauri/target/release/bundle
          - name: Windows
            arch: arm64
            artifact: windows-arm64
            asset_prefix: AI-Ping-Desktop-Preview_1.4.0_windows-arm64
            os: windows-11-arm
            tauri_args: "--bundles nsis,msi"
            bundle_dir: apps/desktop/src-tauri/target/release/bundle
          - name: Linux
            arch: x64
            artifact: linux-x64
            asset_prefix: AI-Ping-Desktop-Preview_1.4.0_linux-x64
            os: ubuntu-24.04
            tauri_args: "--bundles deb,appimage"
            bundle_dir: apps/desktop/src-tauri/target/release/bundle
          - name: Linux
            arch: arm64
            artifact: linux-arm64
            asset_prefix: AI-Ping-Desktop-Preview_1.4.0_linux-arm64
            os: ubuntu-24.04-arm
            tauri_args: "--bundles deb,appimage"
            bundle_dir: apps/desktop/src-tauri/target/release/bundle

    env:
      DESKTOP_BUNDLE_DIR: ${{ matrix.bundle_dir }}
      DESKTOP_RELEASE_DIR: dist/desktop-release
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # macOS universal preview bundles merge Apple Silicon and Intel binaries
      # into one app with Tauri's virtual universal-apple-darwin target.
      - name: Install macOS universal Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # Linux preview bundles need the native WebKitGTK, GTK, AppIndicator,
      # SVG, and patchelf packages that Tauri links against on Ubuntu runners.
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The expensive Tauri packaging path is release-only so normal CI stays
      # focused on tests, typechecks, and web/package builds.
      - name: Build Tauri desktop preview
        run: pnpm --filter @starroy/ai-ping-desktop exec tauri build ${{ matrix.tauri_args }}

      # GitHub Releases accept files, not macOS .app directories, so package
      # the app bundle as a zip while keeping installer files unchanged.
      - name: Stage desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$DESKTOP_RELEASE_DIR"
          mkdir -p "$DESKTOP_RELEASE_DIR"
          asset_prefix="${{ matrix.asset_prefix }}"

          stage_artifact() {
            local source_path="$1"
            local extension="$2"
            cp "$source_path" "$DESKTOP_RELEASE_DIR/${asset_prefix}.${extension}"
          }

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            while IFS= read -r app_bundle; do
              ditto -c -k --sequesterRsrc --keepParent \
                "$app_bundle" \
                "$DESKTOP_RELEASE_DIR/${asset_prefix}.app.zip"
            done < <(find "$DESKTOP_BUNDLE_DIR" -type d -name "*.app")
          fi

          while IFS= read -r artifact; do
            case "$artifact" in
              *.dmg) stage_artifact "$artifact" "dmg" ;;
              *.exe) stage_artifact "$artifact" "exe" ;;
              *.msi) stage_artifact "$artifact" "msi" ;;
              *.AppImage) stage_artifact "$artifact" "AppImage" ;;
              *.deb) stage_artifact "$artifact" "deb" ;;
            esac
          done < <(find "$DESKTOP_BUNDLE_DIR" -type f \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \) \
          )

          find "$DESKTOP_RELEASE_DIR" -type f -print
          artifact_count="$(find "$DESKTOP_RELEASE_DIR" -type f | wc -l | tr -d ' ')"
          test "$artifact_count" -gt 0

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-ping-desktop-preview-${{ matrix.artifact }}
          path: ${{ env.DESKTOP_RELEASE_DIR }}/*
          if-no-files-found: error

      # Desktop preview artifacts are attached only to GitHub Releases; the
      # private desktop workspace is not published to npm.
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.DESKTOP_RELEASE_DIR }}/*
          fail_on_unmatched_files: true
          overwrite_files: true
